{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>
</head>
<body>
    <header>
        <h1>Yodo. Your todo list.</h1>
    </header>
    
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li>
                {{message}}
            </li>                
        {% endfor %}
    </ul>  
    {% endif %}

    {% block content %}
    {% endblock content %}
</body>
    {% block js %}     
    {% endblock js %}     
</html>
